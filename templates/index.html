<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Financial Analysis Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f5f5f5; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 12px; padding: 48px;
          width: 100%; max-width: 480px; border: 1px solid #e0e0e0; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 32px; line-height: 1.5; }
  label { font-size: 13px; font-weight: 500; color: #333;
          display: block; margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; border: 1px solid #ddd;
          border-radius: 8px; font-size: 16px; outline: none;
          text-transform: uppercase; letter-spacing: 1px; }
  input:focus { border-color: #1a1a1a; }
  button { width: 100%; padding: 13px; background: #1a1a1a; color: white;
           border: none; border-radius: 8px; font-size: 15px; font-weight: 500;
           cursor: pointer; margin-top: 16px; }
  button:hover { background: #333; }
  button:disabled { background: #999; cursor: not-allowed; }
  .examples { margin-top: 24px; font-size: 13px; color: #888; }
  .examples span { display: inline-block; background: #f0f0f0;
                   border-radius: 4px; padding: 3px 8px; margin: 3px;
                   cursor: pointer; }
  .examples span:hover { background: #e0e0e0; }
  .loading { display: none; text-align: center; margin-top: 24px; }
  .loading p { font-size: 13px; color: #666; margin-top: 8px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #eee;
             border-top-color: #1a1a1a; border-radius: 50%;
             animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: #fff0f0; border: 1px solid #ffcccc;
           border-radius: 8px; padding: 12px 16px; margin-top: 16px;
           font-size: 13px; color: #cc0000; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>AI Financial Analysis Agent</h1>
  <p class="subtitle">Enter any SEC-listed company ticker to generate an executive briefing from their latest 10-K filing.</p>

  <label>Ticker symbol</label>
  <input type="text" id="ticker" placeholder="e.g. AIG" maxlength="6">

  <button onclick="analyze()" id="btn">Generate Report</button>

  <div class="examples">
    Try: 
    <span onclick="setTicker('AIG')">AIG</span>
    <span onclick="setTicker('PRU')">PRU</span>
    <span onclick="setTicker('MET')">MET</span>
    <span onclick="setTicker('CB')">CB</span>
    <span onclick="setTicker('TRV')">TRV</span>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Downloading 10-K from SEC EDGAR...<br>Extracting metrics and generating analysis.<br>This takes about 60 seconds.</p>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
function setTicker(t) {
  document.getElementById('ticker').value = t;
}

async function analyze() {
  const ticker = document.getElementById('ticker').value.trim();
  if (!ticker) return;

  document.getElementById('btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker })
    });
    const data = await res.json();

    if (data.error) {
      document.getElementById('error').textContent = data.error;
      document.getElementById('error').style.display = 'block';
    } else {
      localStorage.setItem('report', JSON.stringify(data));
      window.location.href = '/report';
    }
  } catch(e) {
    document.getElementById('error').textContent = 'Something went wrong. Please try again.';
    document.getElementById('error').style.display = 'block';
  }

  document.getElementById('btn').disabled = false;
  document.getElementById('loading').style.display = 'none';
}

document.getElementById('ticker').addEventListener('keypress', e => {
  if (e.key === 'Enter') analyze();
});
</script>
</body>
</html>
